<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>나의 사이드 프로젝트 포트폴리오</title>
</head>
<body>

    <header class="header">
        <div id="clock">00:00:00</div>
        <div id="date">2026. 04. 24. 금요일</div>
    </header>

    <main class="project-container">
        <section class="project-card">
            <img src="project1-icon.png" alt="프로젝트1" class="project-icon">
            <h3>🎨 판타지 소설 집필</h3>
            <p>한국 무속 신앙과 예술 복원가 이야기를 다룬 단편 판타지 소설</p>
        </section>

        <section class="project-card">
            <img src="project2-icon.png" alt="프로젝트2" class="project-icon">
            <h3>🥕 캐롯 델타</h3>
            <p>델타 포스 게임 플레이를 기록하는 유튜브 채널 프로젝트</p>
        </section>

        <section class="project-card">
            <img src="project3-icon.png" alt="프로젝트3" class="project-icon">
            <h3>🛡️ 안전 비서 앱</h3>
            <p>심리적 안정과 위험 상황 대응을 돕는 안드로이드 애플리케이션</p>
        </section>
    </main>

    <script>
        function updateTime() {
            const now = new Date();
            
            // 시간 업데이트
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

            // 날짜 업데이트
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('ko-KR', options);
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
